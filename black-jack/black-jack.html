<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Black Jack</title>
        <link rel="stylesheet" href="black-jack.css">
        <script src="black-jack.js"></script>
    </head>

    <body>
        <h2>Dealer: <span id="dealer-sum"></span></h2>
        <div id="dealer-cards">
            <img id="hidden" src="./cards/BACK.png">
        </div>
        <h2>You: <span id="your-sum"></span></h2>
        <div id="your-cards"></div>
        <div class="button" style=" position:fixed; top:10px; right:10px;">
            <button style=" background-color: darkgray" onclick="location.reload()"> RESTART </button>
        </div>
        <br>
        <button id="hit">Hit</button>
        <button id="stay">Stay</button>
        <p id="results"></p>

        <audio autoplay loop>
            <source src="black-jack.mp3" type="audio/mp3">
        </audio>

        <div class="button" style=" position:fixed; top:10px; right:10px;">
            <button style=" background-color: darkgray" onclick="location.reload()"> RESTART </button>
        </div>

    </body>
</html>
