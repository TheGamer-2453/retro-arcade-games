<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Retro Arcade Games</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="lines"></div>
        <div class="main">
            <div class="noise"></div>
            <div class="noise"></div>
            <div class="VHS" data-splitting>
                Retro Arcade Games
            </div>
            <div class="time">
                <span id="time"></span>
            </div>
            <div class="counter">
                REC
            <label id="minutes">00</label>:<label id="seconds">00</label>
            </div>
        </div>
        <script src="index.js"></script>
        <div class="button" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); display:flex; flex-direction:column; align-items:center;"></div>
        <div class="button">
            <button onclick="window.location.href='../single-player/single-player.html'">
                Single Player
            </button>
            <button onclick="window.location.href='../two-player/two-player.html'">
                Two Player
            </button>
        </div>
        </div>
    </body>
</html>
